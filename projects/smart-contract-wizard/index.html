<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Contract Wizard | Christopher Hirschauer</title>
  <meta
    name="description"
    content="Embedded OpenZeppelin Smart Contract Wizard for rapid Solidity contract scaffolding."
  />
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0b1020;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .wizard-shell {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .wizard-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.25);
      color: #e2e8f0;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      background: rgba(15, 23, 42, 0.9);
    }

    oz-wizard {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <main class="wizard-shell">
    <header class="wizard-header">Smart Contract Wizard (OpenZeppelin Embed)</header>
    <oz-wizard data-lang="solidity"></oz-wizard>
  </main>

  <script async src="https://wizard.openzeppelin.com/build/embed.js"></script>
</body>
</html>
