<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Contract Wizard | Christopher Hirschauer</title>
  <meta
    name="description"
    content="Smart Contract Wizard workspace with OpenZeppelin embed for rapid ERC contract scaffolding and export."
  />
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --surface: rgba(15, 23, 42, 0.88);
      --border: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.08), transparent 40%), var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-height: 100vh;
      width: 100%;
      padding: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
    }

    main {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      width: 100%;
      margin: 0;
    }

    oz-wizard {
      width: 100%;
      height: 100%;
      display: block;
      min-height: 0;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Smart Contract Wizard</h1>
      <p>OpenZeppelin-powered Solidity contract scaffolding for rapid iteration.</p>
    </div>
    <a href="../../index.html" aria-label="Back to home">Back to portfolio</a>
  </header>

  <main aria-label="OpenZeppelin Wizard embed">
    <script async src="https://wizard.openzeppelin.com/build/embed.js"></script>
    <oz-wizard data-lang="solidity"></oz-wizard>
  </main>
</body>
</html>
