<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Contract Wizard | Christopher Hirschauer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <meta
    name="description"
    content="Open the Smart Contract Wizard: an embedded OpenZeppelin-based contract builder inside Christopher Hirschauer's site shell."
  />
  <link rel="stylesheet" href="../../styles/global.css" />
  <link rel="icon" type="image/png" href="../../assets/GSlogo01.png" />
  <style>
    :root {
      color-scheme: dark;
      --wizard-bg: #020617;
      --wizard-surface: rgba(15, 23, 42, 0.92);
      --wizard-border: rgba(148, 163, 184, 0.2);
      --wizard-text: #e2e8f0;
      --wizard-muted: #94a3b8;
      --wizard-link: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--wizard-bg);
      color: var(--wizard-text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.wizard-page {
      min-height: 100dvh;
    }

    .wizard-shell {
      width: min(1280px, 100%);
    }

    .wizard-frame {
      width: 100%;
      min-height: min(1280px, calc(100dvh - 220px));
      padding: 0;
      border: 1px solid var(--wizard-border);
      border-radius: 24px;
      background: var(--wizard-surface);
      box-shadow: 0 24px 56px rgba(2, 6, 23, 0.4);
      overflow: hidden;
    }

    oz-wizard {
      display: block;
      width: 100%;
      height: min(1280px, calc(100dvh - 220px));
    }

    @media (max-width: 720px) {
      .wizard-frame,
      oz-wizard {
        min-height: calc(100dvh - 190px);
        height: calc(100dvh - 190px);
      }
    }
  </style>
</head>
<body class="wizard-page">
  <div class="page-shell wizard-shell">
    <header id="top" class="site-header">
      <nav class="top-nav">
        <a class="brand" href="../../index.html#top">
          <span class="brand-mark">
            <img src="../../assets/GSlogo01.png" alt="Brand logo" class="brand-logo" />
          </span>
          C.E. Hirschauer
        </a>
        <div class="nav-links">
          <a href="../../index.html#top">Home</a>
          <div class="nav-item">
            <button class="nav-button" type="button" aria-expanded="false" aria-haspopup="true">
              Projects <span class="caret" aria-hidden="true">▾</span>
            </button>
            <div class="nav-dropdown" role="menu">
              <a href="https://github.com/74Thirsty/VANTAGE" target="_blank" rel="noopener noreferrer" role="menuitem">VANTAGE</a>
              <a href="../../autogaap/" role="menuitem">Auto GAAP</a>
              <a href="../../projects/claude-api/" role="menuitem">Claude API Lab</a>
              <a href="https://github.com/74Thirsty/TarotTeller" target="_blank" rel="noopener noreferrer" role="menuitem">EasyBay</a>
              <a href="../../projects/smart-contract-wizard/" role="menuitem">Smart Contract Wizard</a>
            </div>
          </div>
          <a href="../../books/">Books</a>
          <a href="../../index.html#contact">Contact</a>
        </div>
        <a class="button primary nav-cta" href="../../index.html#contact">Collaborate</a>
        <div class="scroll-progress" aria-hidden="true">
          <span></span>
        </div>
      </nav>
    </header>

    <main class="site-main">
      <section class="wizard-frame" aria-label="Smart Contract Wizard workspace">
        <script async src="https://wizard.openzeppelin.com/build/embed.js"></script>
        <oz-wizard data-lang="solidity"></oz-wizard>
      </section>
    </main>
  </div>
  <script src="../../scripts/global.js"></script>
</body>
</html>
