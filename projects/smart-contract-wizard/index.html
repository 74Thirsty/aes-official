<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Contract Wizard | Christopher Hirschauer</title>
  <meta
    name="description"
    content="Open the Smart Contract Wizard: an embedded OpenZeppelin-based contract builder inside Christopher Hirschauer's site shell."
  />
  <link rel="stylesheet" href="../../styles/global.css" />
  <link rel="icon" type="image/png" href="../../assets/GSlogo01.png" />
  <style>
    :root {
      color-scheme: dark;
      --wizard-bg: #020617;
      --wizard-surface: rgba(15, 23, 42, 0.92);
      --wizard-border: rgba(148, 163, 184, 0.2);
      --wizard-text: #e2e8f0;
      --wizard-muted: #94a3b8;
      --wizard-link: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--wizard-bg);
      color: var(--wizard-text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
    }

    .wizard-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: var(--wizard-surface);
      border: 1px solid var(--wizard-border);
      border-radius: 18px;
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 10;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 40px rgba(2, 6, 23, 0.35);
      pointer-events: none;
    }

    .wizard-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      pointer-events: auto;
    }

    .wizard-brand img {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.04);
      padding: 4px;
    }

    .wizard-brand-copy {
      display: grid;
      gap: 2px;
    }

    .wizard-brand-copy strong {
      font-size: 0.98rem;
    }

    .wizard-brand-copy span {
      font-size: 0.84rem;
      color: var(--wizard-muted);
    }

    .wizard-back {
      color: var(--wizard-link);
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: auto;
    }

    .wizard-frame {
      width: 100vw;
      height: 100dvh;
    }

    oz-wizard {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 720px) {
      .wizard-topbar {
        top: 12px;
        left: 12px;
        right: 12px;
        padding: 12px 14px;
      }

      .wizard-brand-copy span {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="wizard-topbar">
    <div class="wizard-brand">
      <img src="../../assets/GSlogo01.png" alt="Christopher Hirschauer logo" />
      <div class="wizard-brand-copy">
        <strong>Smart Contract Wizard</strong>
        <span>Embedded OpenZeppelin contract builder</span>
      </div>
    </div>
    <a class="wizard-back" href="../../#projects">Back to site</a>
  </header>

  <main class="wizard-frame">
    <script async src="https://wizard.openzeppelin.com/build/embed.js"></script>
    <oz-wizard data-lang="solidity"></oz-wizard>
  </main>
</body>
</html>
