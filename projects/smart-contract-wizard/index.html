<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Contract Wizard | Christopher Hirschauer</title>
  <link rel="stylesheet" href="../../styles/global.css" />
  <meta
    name="description"
    content="Smart Contract Wizard workspace with OpenZeppelin embed for rapid ERC contract scaffolding and export."
  />
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --surface: rgba(15, 23, 42, 0.88);
      --border: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.08), transparent 40%), var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      padding: 0 12px 12px;
    }

    .wizard-shell-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      margin: 0 -12px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 15, 32, 0.88);
      backdrop-filter: blur(10px);
      padding: 8px 12px;
    }

    .wizard-shell-nav .top-nav {
      margin: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin: 0 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
    }

    main {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      width: 100%;
    }

    oz-wizard {
      width: 100%;
      height: 100%;
      display: block;
      min-height: calc(100vh - 180px);
    }
  </style>
</head>
<body>
  <div class="wizard-shell-nav">
    <nav class="top-nav">
      <a class="brand" href="../../index.html#top">
        <span class="brand-mark">
          <img src="../../assets/GSlogo01.png" alt="Brand logo" class="brand-logo">
        </span>
        C.E. Hirschauer
      </a>
      <div class="nav-links">
        <a href="../../index.html#top">Home</a>
        <a href="../index.html">Projects</a>
        <a href="../../books/index.html">Books</a>
        <a href="../../index.html#contact">Contact</a>
      </div>
      <a class="button primary nav-cta" href="../../index.html#contact">Collaborate</a>
      <div class="scroll-progress" aria-hidden="true">
        <span></span>
      </div>
    </nav>
  </div>

  <header>
    <div>
      <h1>Smart Contract Wizard</h1>
      <p>OpenZeppelin-powered Solidity contract scaffolding for rapid iteration.</p>
    </div>
    <a href="../../index.html" aria-label="Back to home">Back to portfolio</a>
  </header>

  <main aria-label="OpenZeppelin Wizard embed">
    <script async src="https://wizard.openzeppelin.com/build/embed.js"></script>
    <oz-wizard data-lang="solidity"></oz-wizard>
  </main>
</body>
</html>
